# 🌐 HTTP Server - Redirects all unencrypted traffic to HTTPS
server {
    listen 80;
    server_name itschatapp.duckdns.org;

    # Automatically force global traffic straight to the encrypted port
    location / {
        return 301 https://$host$request_uri;
    }
}

# 🔒 HTTPS Server - Handles secure encryption and proxies downstream
server {
    listen 443 ssl;
    server_name itschatapp.duckdns.org localhost; # Added localhost here for internal container queries

    # Point straight to the shared Let's Encrypt volume mount pathways
    ssl_certificate /etc/letsencrypt/live/itschatapp.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itschatapp.duckdns.org/privkey.pem;

    # Optimized security protocol modernizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 📊 MOVE STATUS HERE: Allow your internal backend container to read Nginx telemetry metrics safely
    location /nginx_status {
        stub_status;
        allow all; # Allows adjacent containers in the same Docker Compose bridge network to scrape data
    }

    # Serve static React frontend distribution assets
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Securely route Admin panel routes backstage
    location /api/admin/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pass Socket.io real-time chat loops upstream
    location /socket.io/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Handle standard application routing interfaces
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}